<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validation Pipeline Execution</title>
    <!-- Asciinema Player CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/asciinema-player@3.6.3/dist/bundle/asciinema-player.css" />
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        p {
            color: #94a3b8;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Content Engineering Assistant: Pipeline Execution</h1>
        <p>Raw terminal recording of the automated documentation pipeline intercepting a Git Diff.</p>
        
        <!-- Asciinema Player Container -->
        <div id="demo"></div>
    </div>

    <!-- Asciinema Player JS -->
    <script src="https://cdn.jsdelivr.net/npm/asciinema-player@3.6.3/dist/bundle/asciinema-player.min.js"></script>
    <script>
        AsciinemaPlayer.create('survival-stack-demo.cast', document.getElementById('demo'), {
            autoPlay: true,
            loop: true,
            theme: 'dracula',
            fit: 'width'
        });
    </script>

</body>
</html>
