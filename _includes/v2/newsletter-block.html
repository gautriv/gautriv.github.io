<section class="newsletter-section" id="subscribe" aria-label="Newsletter signup">
  <div class="newsletter-inner">
    <div class="newsletter-copy">
      <h2>Get the <span class="accent">dispatch</span></h2>
      <p>One essay every other Sunday. Slow, considered, no filler.</p>
    </div>
    <form id="dispatch-form" class="newsletter-form" aria-label="Newsletter signup">
      <div class="input-row">
        <input type="email" id="dispatch-email" name="email" placeholder="you@somewhere.com" required>
        <button type="submit" id="dispatch-submit" class="newsletter-submit">Subscribe</button>
      </div>
    </form>
    <div id="dispatch-success" style="display: none; margin-top: 15px; color: #4ade80; font-size: 14px; font-weight: 500;">
      ✓ Check your inbox to confirm your subscription.
    </div>
    <div id="dispatch-error" style="display: none; margin-top: 15px; color: #fca5a5; font-size: 14px; font-weight: 500;" role="alert"></div>
  </div>
</section>
