<section class="newsletter-section" id="subscribe" aria-label="Newsletter signup">
  <div class="newsletter-inner">
    <div class="newsletter-copy">
      <h2>Get the <span class="accent">dispatch</span></h2>
      <p>One essay every other Sunday. Slow, considered, no filler.</p>
    </div>
    <form class="newsletter-form" data-newsletter aria-label="Newsletter signup">
      <div class="input-row">
        <input type="email" name="email" placeholder="you@somewhere.com" required>
        <button type="submit" class="newsletter-submit">Subscribe</button>
      </div>
      <p class="newsletter-status" data-newsletter-status role="status" aria-live="polite"></p>
    </form>
  </div>
</section>
