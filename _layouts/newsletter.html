---
layout: default
---

<article class="newsletter-archive">
  <header class="newsletter-archive-head">
    <p class="newsletter-archive-eyebrow">Dispatch &middot; {{ page.date | date: "%B %-d, %Y" }}</p>
    <h1 class="newsletter-archive-title">{{ page.title }}</h1>
    {% if page.preheader %}<p class="newsletter-archive-preheader">{{ page.preheader }}</p>{% endif %}
  </header>

  <div class="newsletter-archive-body">
    {{ content }}
  </div>

  <footer class="newsletter-archive-footer">
    <p>This edition went out to the dispatch list on {{ page.date | date: "%B %-d, %Y" }}.</p>
    <p><a href="/survival-stack.html">Get the survival kit</a> &middot; <a href="/#subscribe">Subscribe to the dispatch</a></p>
  </footer>
</article>

<style>
  .newsletter-archive {
    max-width: 680px;
    margin: 0 auto;
    padding: 64px 32px 96px;
    font-family: var(--serif, Georgia, 'Times New Roman', serif);
    color: var(--text);
    line-height: 1.65;
  }
  .newsletter-archive-head {
    margin-bottom: 40px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--line);
  }
  .newsletter-archive-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--accent);
    margin: 0 0 18px 0;
    font-weight: 600;
  }
  .newsletter-archive-title {
    font-family: var(--sans);
    font-size: clamp(1.8rem, 4vw, 2.6rem);
    line-height: 1.15;
    letter-spacing: -0.02em;
    font-weight: 600;
    margin: 0 0 16px 0;
    color: var(--text);
  }
  .newsletter-archive-preheader {
    font-family: var(--sans);
    font-size: 1.05rem;
    color: var(--text-2);
    line-height: 1.5;
    margin: 0;
  }
  .newsletter-archive-body { font-size: 17px; }
  .newsletter-archive-body p { margin: 0 0 20px 0; }
  .newsletter-archive-body h2 {
    font-family: var(--sans);
    font-size: 1.4rem;
    margin: 40px 0 14px;
    letter-spacing: -0.01em;
  }
  .newsletter-archive-body h3 { font-family: var(--sans); font-size: 1.15rem; margin: 28px 0 10px; }
  .newsletter-archive-body blockquote {
    border-left: 2px solid var(--accent);
    padding: 6px 0 6px 20px;
    margin: 24px 0;
    color: var(--text-2);
    font-style: italic;
  }
  .newsletter-archive-body a { color: var(--accent); }
  .newsletter-archive-body code {
    background: var(--bg-3);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: var(--mono);
    font-size: 0.92em;
  }
  .newsletter-archive-body pre {
    background: var(--bg-3);
    padding: 18px;
    border-radius: 8px;
    overflow-x: auto;
    font-family: var(--mono);
    font-size: 14px;
    margin: 24px 0;
  }
  .newsletter-archive-body pre code { background: none; padding: 0; }
  .newsletter-archive-footer {
    margin-top: 64px;
    padding-top: 28px;
    border-top: 1px solid var(--line);
    font-family: var(--sans);
    font-size: 0.9rem;
    color: var(--text-3);
  }
  .newsletter-archive-footer p { margin: 0 0 8px 0; }
  .newsletter-archive-footer a { color: var(--accent); text-decoration: none; }
  .newsletter-archive-footer a:hover { text-decoration: underline; }
</style>
