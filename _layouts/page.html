---
layout: default
---
<article class="page-frame">
  <header class="page-head">
    <h1>{{ page.title }}</h1>
    {% if page.description and page.hometype != "homepage" %}
      <p class="dek">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="page-body">
    {{ content }}
  </div>
</article>
