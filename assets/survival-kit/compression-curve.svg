<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="curveTitle curveDesc">
  <title id="curveTitle">The compression curve</title>
  <desc id="curveDesc">A conceptual chart with two intersecting lines. A rust-red line descends from upper-left to lower-right, labeled manual drafting effort. An electric-blue line ascends from lower-left to upper-right, labeled judgment and governance value. They cross at a marked point in the center labeled the shift point.</desc>

  <!-- Background field grid (subtle) -->
  <g stroke="rgba(91,141,239,0.06)" stroke-width="1">
    <line x1="60" y1="80"  x2="740" y2="80"/>
    <line x1="60" y1="160" x2="740" y2="160"/>
    <line x1="60" y1="240" x2="740" y2="240"/>
    <line x1="60" y1="320" x2="740" y2="320"/>
    <line x1="60"  y1="60" x2="60"  y2="340"/>
    <line x1="400" y1="60" x2="400" y2="340"/>
    <line x1="740" y1="60" x2="740" y2="340"/>
  </g>

  <!-- Red descending sigmoid: manual drafting effort -->
  <path d="M 60 100 C 220 100, 320 150, 400 200 C 480 250, 580 360, 740 360"
        fill="none" stroke="#8B2C24" stroke-width="2.5" stroke-linecap="round" opacity="0.95"/>

  <!-- Blue ascending sigmoid: judgment / governance value -->
  <path d="M 60 320 C 220 320, 320 250, 400 200 C 480 150, 580 80, 740 80"
        fill="none" stroke="#5B8DEF" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Intersection marker -->
  <circle cx="400" cy="200" r="7" fill="#0A0A0B" stroke="#EDEDF0" stroke-width="1.5"/>

  <!-- End-of-line labels -->
  <text x="60" y="68" font-family="Geist Mono, ui-monospace, monospace" font-size="11" fill="#B85B4F" letter-spacing="0.02em">manual drafting effort &#8594;</text>
  <text x="740" y="68" font-family="Geist Mono, ui-monospace, monospace" font-size="11" fill="#5B8DEF" letter-spacing="0.02em" text-anchor="end">judgment / governance value &#8594;</text>

  <!-- Shift-point label -->
  <text x="414" y="196" font-family="Geist Mono, ui-monospace, monospace" font-size="10" fill="#EDEDF0" letter-spacing="0.06em">&#167; the shift point</text>

  <!-- Time axis hints -->
  <text x="60" y="385" font-family="Geist Mono, ui-monospace, monospace" font-size="10" fill="#5A5A66" letter-spacing="0.04em">&#8592;  yesterday</text>
  <text x="740" y="385" font-family="Geist Mono, ui-monospace, monospace" font-size="10" fill="#5A5A66" letter-spacing="0.04em" text-anchor="end">tomorrow  &#8594;</text>
</svg>
